/* ═══════════════════════════════════════════════════════════════════════
   FORMAT HELPERS
═══════════════════════════════════════════════════════════════════════ */
const addCommas = n => {
  const [int, dec] = Math.abs(n).toFixed(2).split(".");
  return int.replace(/\B(?=(\d{3})+(?!\d))/g, ",") + "." + dec;
};
const fm = (n, showDash = true) => {
  if (showDash && n === 0) return "–";
  return n < 0 ? "(" + addCommas(n) + ")" : addCommas(n);
};
const fmAbs = n => addCommas(n);

/* ═══════════════════════════════════════════════════════════════════════
   COMPUTATION ENGINE
═══════════════════════════════════════════════════════════════════════ */
function computeTax(d, isSME) {
  const v = x => parseFloat(x) || 0;
  const npbt=v(d.netProfitBeforeTax), dep=v(d.depreciation), ent=v(d.entertainmentDisallowed),
    pen=v(d.penalties), nonDon=v(d.nonApprovedDonations), taxProv=v(d.incomeTaxProvision),
    priv=v(d.privateExpenses), capIt=v(d.capitalItemsToAddBack), other=v(d.otherAddBacks);

  // Dividend income: EXEMPT for companies under single-tier system (Schedule 6, ITA 1967).
  // Transferred OUT of business income but NOT re-introduced to aggregate income.
  const div = v(d.dividendIncome);
  // Interest s.4(c), Rental s.4(d), Royalty s.4(d): taxable — transferred out, then re-introduced
  const inte=v(d.interestIncome), ren=v(d.rentalIncome), roy=v(d.royaltyIncome);
  const taxableOther = inte + ren + roy;          // re-introduced to aggregate income
  const totalTransferOut = div + inte + ren + roy; // all P&L other income transferred out

  // s.33 ITA 1967: If NO business revenue, ALL expenses are non-allowable.
  // Adjusted income = gross business revenue = 0.
  const grossRev = d.grossRevenue === "" || d.grossRevenue === undefined ? null : v(d.grossRevenue);
  const noRevenue = grossRev !== null && grossRev === 0;

  // Step 2: Remove other income first → business profit/(loss)
  const businessProfit = npbt - totalTransferOut;

  let totalAB, adjIncome, noRevenueAddBack = 0;
  if (noRevenue) {
    // s.33: All expenses disallowed = the pure business loss (expenses with no revenue)
    // businessProfit here = 0 - expenses = negative (business expenses only)
    noRevenueAddBack = Math.max(0, -businessProfit); // add back all to reach 0
    totalAB = 0;
    adjIncome = 0;
  } else {
    // Step 3: Add back disallowed expenses → adjusted income (before CA)
    totalAB = dep + ent + pen + nonDon + taxProv + priv + capIt + other;
    adjIncome = businessProfit + totalAB;
  }
  const ca = d.capitalAllowances || {};
  const caRows = Object.entries(ca).map(([k, x]) => {
    const ia=v(x.ia), aa=v(x.aa), bc=v(x.balancingCharge), ba=v(x.balancingAllowance);
    return { key: k, label: x.label || k, ia, aa, bc, ba, net: ia + aa + ba - bc };
  });
  const totalCA = caRows.reduce((s, r) => s + r.net, 0);
  let statIncome = 0, unusedCA = 0;
  if (adjIncome >= totalCA) { statIncome = adjIncome - totalCA; }
  else { unusedCA = totalCA - Math.max(adjIncome, 0); }
  // Aggregate income: statutory business income + taxable other income ONLY (dividends excluded — exempt)
  const aggregateIncome = statIncome + taxableOther;
  const maxDon = Math.max(0, 0.1 * aggregateIncome);
  const donDeduct = Math.min(v(d.approvedDonations), maxDon);
  const totalIncome = aggregateIncome - donDeduct;
  const maxLoss = Math.max(0, 0.7 * statIncome);
  const lossDeduct = Math.min(v(d.unabsorbedLossesBF), maxLoss);
  const caDeduct = v(d.unabsorbedCABF);
  const chargeableIncome = Math.max(0, totalIncome - lossDeduct - caDeduct);
  let grossTax = 0, taxBD = [];
  if (chargeableIncome > 0) {
    if (isSME) {
      const t1 = Math.min(chargeableIncome, 150000) * 0.15;
      const t2 = Math.max(0, Math.min(chargeableIncome, 600000) - 150000) * 0.17;
      const t3 = Math.max(0, chargeableIncome - 600000) * 0.24;
      grossTax = t1 + t2 + t3;
      if (t1 > 0) taxBD.push({ label: `First RM${addCommas(Math.min(chargeableIncome, 150000))} × 15%`, amount: t1 });
      if (t2 > 0) taxBD.push({ label: `Next RM${addCommas(Math.min(chargeableIncome - 150000, 450000))} × 17%`, amount: t2 });
      if (t3 > 0) taxBD.push({ label: `Balance RM${addCommas(chargeableIncome - 600000)} × 24%`, amount: t3 });
    } else {
      grossTax = chargeableIncome * 0.24;
      taxBD = [{ label: `RM${addCommas(chargeableIncome)} × 24%`, amount: grossTax }];
    }
  }
  const cp204=v(d.cp204Payments), withheld=v(d.taxDeductedAtSource), zakat=v(d.zakat);
  const totalCredits = cp204 + withheld + zakat;
  const netTax = grossTax - totalCredits;
  return {
    npbt, dep, ent, pen, nonDon, taxProv, priv, capIt, other, totalAB,
    noRevenue, noRevenueAddBack, grossRev,
    div, inte, ren, roy, taxableOther, totalTransferOut, businessProfit,
    totalNTI: totalTransferOut,   // alias kept for PDF generator compatibility
    adjIncome, caRows, totalCA, unusedCA,
    statIncome, aggregateIncome, maxDon, donDeduct, approvedDonations: v(d.approvedDonations),
    totalIncome, maxLoss, lossDeduct, unabsorbedLossesBF: v(d.unabsorbedLossesBF),
    caDeduct, unabsorbedCABF: v(d.unabsorbedCABF),
    chargeableIncome, grossTax, taxBD, cp204, withheld, zakat, totalCredits, netTax
  };
}

/* ═══════════════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════════════ */
const EXTRACT_PROMPT = `You are a Malaysian corporate tax expert reading a set of management or audited accounts. Extract every financial figure you can see and map it to the JSON fields below.

STEP 1 — READ THE DOCUMENT CAREFULLY
Look at every page: Profit & Loss / Income Statement, Balance Sheet, Notes to Accounts, Fixed Asset Schedule.

STEP 2 — FIELD MAPPING GUIDE (common Malaysian account labels → JSON field):
- "Revenue" / "Turnover" / "Sales" / "Hasil" / "Jualan" → grossRevenue (0 if no revenue at all)
- "Profit before taxation" / "Net profit before tax" / "Untung sebelum cukai" → netProfitBeforeTax (LOSS = negative number)
- "Depreciation" / "Susutnilai" / "Depreciation of property, plant and equipment" → depreciation
- "Entertainment" / "Hiburan" / "Jamuan" → entertainmentExpensesTotal (entertainmentDisallowed = half of this)
- "Penalty" / "Penalti" / "Fine" / "Denda" → penalties
- "Donation" / "Derma" (non-approved bodies) → nonApprovedDonations
- "Tax provision" / "Income tax provision" / "Cukai pendapatan" (P&L charge) → incomeTaxProvision
- "Dividend income" / "Dividen" → dividendIncome
- "Interest income" / "Pendapatan faedah" → interestIncome
- "Rental income" / "Pendapatan sewa" → rentalIncome
- "CP204" / "Instalment tax paid" → cp204Payments
- Company name from header/footer → companyInfo.name
- Financial year end → basisPeriodEnd (derive yearOfAssessment and basisPeriodStart from this)

NUMBERS: Strip commas and currency symbols. Bracketed numbers like (250,000) are NEGATIVE → use -250000.
Use your best judgment — never default to 0 if a figure exists on the page.

STEP 3 — CAPITAL ALLOWANCES
If a Fixed Asset Schedule / PPE note exists, extract IA and AA per category. Otherwise leave as 0.

Return ONLY this JSON object. Start with { end with }. No text outside the braces. No markdown.
{
  "companyInfo": {"name":"","yearOfAssessment":"","basisPeriodStart":"","basisPeriodEnd":""},
  "grossRevenue":0,"netProfitBeforeTax":0,"depreciation":0,"entertainmentExpensesTotal":0,"entertainmentDisallowed":0,
  "penalties":0,"nonApprovedDonations":0,"incomeTaxProvision":0,"privateExpenses":0,
  "capitalItemsToAddBack":0,"otherAddBacks":0,"dividendIncome":0,"interestIncome":0,
  "rentalIncome":0,"royaltyIncome":0,"approvedDonations":0,"unabsorbedLossesBF":0,
  "unabsorbedCABF":0,"cp204Payments":0,
  "capitalAllowances":{
    "plantMachinery":{"ia":0,"aa":0,"balancingCharge":0,"balancingAllowance":0},
    "motorVehicles":{"ia":0,"aa":0,"balancingCharge":0,"balancingAllowance":0},
    "officeEquipment":{"ia":0,"aa":0,"balancingCharge":0,"balancingAllowance":0},
    "computers":{"ia":0,"aa":0,"balancingCharge":0,"balancingAllowance":0},
    "industrialBuilding":{"ia":0,"aa":0,"balancingCharge":0,"balancingAllowance":0}
  }
}`;

const ASSET_PROMPT = `You are a Malaysian tax accountant reading a fixed asset listing / asset register.
Extract capital allowances for tax purposes under Schedule 3 ITA 1967.
For each category, identify Initial Allowance (IA, 20% of new QE; 10% for buildings) and Annual Allowance (AA at prescribed rates).

Output ONLY this JSON:

const CP204_PROMPT = `You are a Malaysian tax accountant reading a CP204 instalment payment document or bank statement.

const LASTYEAR_PROMPT = `You are a Malaysian tax accountant reading a prior year tax computation or LHDN Form C.

/* ═══════════════════════════════════════════════════════════════════════
   SUB-COMPONENTS — defined outside App so they never remount unexpectedly
═══════════════════════════════════════════════════════════════════════ */
function NavBtn({ step, setStep, i, label }) {
  const active = step === i, done = step > i;
  return (
    <button
      onClick={() => done && setStep(i)}
      style={{ padding:"5px 14px", border:"none", borderRadius:20, fontSize:12,
        cursor: done ? "pointer" : "default", fontWeight: active ? 600 : 400,
        background: active ? "#C8A44E" : done ? "rgba(200,164,78,0.25)" : "rgba(255,255,255,0.1)",
        color: active ? "#0D2137" : "#fff", transition:"all 0.2s" }}>
      {i}. {label}
    </button>
  );
}

function UploadSlot({ slot, docs, setDocs, docRefs, readDocFile }) {
  const d = docs[slot.key];
  const ref = docRefs[slot.key];
  const onFile = f => { if (f) readDocFile(slot.key, f); };
  const remove = e => { e.stopPropagation(); setDocs(p => ({ ...p, [slot.key]: EMPTY_DOC() })); };
  return (
    <div style={{ background:"var(--bg1)", border:"0.5px solid var(--border3)", borderRadius:10, padding:"14px 16px" }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:10, marginBottom:10 }}>
        <div style={{ width:34, height:34, borderRadius:8, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center",
          background: d.ready ? "rgba(34,197,94,0.12)" : slot.required ? "rgba(200,164,78,0.12)" : "var(--bg2)" }}>
          <i className={"ti " + slot.icon} style={{ fontSize:17, color: d.ready ? "#22c55e" : slot.required ? "#C8A44E" : "var(--text2)" }} aria-hidden="true" />
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:500, color:"var(--text1)", display:"flex", alignItems:"center", gap:6 }}>
            {slot.label}
            {slot.required && <span style={{ fontSize:10, background:"rgba(200,164,78,0.15)", color:"#C8A44E", borderRadius:4, padding:"1px 5px", fontWeight:500 }}>Required</span>}
          </div>
          <div style={{ fontSize:11, color:"var(--text2)", marginTop:2 }}>{slot.sub}</div>
        </div>
      </div>
      <div
        onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = "#C8A44E"; }}
        onDragLeave={e => { e.currentTarget.style.borderColor = d.ready ? "#22c55e" : "var(--border2)"; }}
        onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = d.ready ? "#22c55e" : "var(--border2)"; onFile(e.dataTransfer.files[0]); }}
        onClick={() => ref.current?.click()}
        style={{ border:"1.5px dashed " + (d.ready ? "#22c55e" : "var(--border2)"), borderRadius:8, padding:"12px",
          textAlign:"center", cursor:"pointer", background: d.ready ? "rgba(34,197,94,0.04)" : "var(--bg2)", transition:"all 0.15s" }}>
        <input ref={ref} type="file" accept={slot.accept} style={{ display:"none" }} onChange={e => onFile(e.target.files[0])} />
        {d.file
          ? <div style={{ fontSize:12, color: d.ready ? "#22c55e" : "#C8A44E", fontWeight:500 }}>{d.ready ? "✓ " : "⟳ "}{d.file.name}</div>
          : <div style={{ fontSize:12, color:"var(--text2)" }}>Click or drag file here · PDF / Excel / CSV</div>}
      </div>
      {d.file && <button style={{ marginTop:8, background:"none", border:"none", fontSize:11, color:"var(--text2)", cursor:"pointer", padding:0 }} onClick={remove}>✕ Remove</button>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   MAIN APPLICATION

function App() {
  const [step, setStep]   = useState(1);
  const [info, setInfo]   = useState({ name:"", taxRef:"", incNo:"", ya:"2025", bpStart:"01/01/2025", bpEnd:"31/12/2025", isSME:true, paidUpCapital:"" });
  const [data, setData]   = useState(INIT);
  const [note, setNote]   = useState(null);
  const [loading, setLoading]     = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [aiMsg, setAiMsg] = useState("");
  const [aiIsError, setAiIsError] = useState(false);
  const [caExpanded, setCaExpanded] = useState(true);
  const [docs, setDocs]   = useState({
    accounts: EMPTY_DOC(), assets: EMPTY_DOC(), cp204: EMPTY_DOC(), lastYear: EMPTY_DOC()
  });
  const docRefs = {
    accounts: useRef(null), assets: useRef(null), cp204: useRef(null), lastYear: useRef(null)
  };

  const res = useMemo(() => computeTax(data, info.isSME), [data, info.isSME]);

  const setNum   = (field, val)           => setData(p => ({ ...p, [field]: parseFloat(val) || 0 }));
  const setCA    = (caKey, field, val)    => setData(p => ({ ...p, capitalAllowances: { ...p.capitalAllowances, [caKey]: { ...p.capitalAllowances[caKey], [field]: parseFloat(val) || 0 } } }));
  const setInfoF = (field, val)           => setInfo(p => ({ ...p, [field]: val }));

  /* ── File reading ── */
  const readDocFile = (key, f) => {
    const isExcel = f.name.match(/\.(xlsx|xls|xlsm|csv)$/i);
    const upd = patch => setDocs(p => ({ ...p, [key]: { ...p[key], ...patch } }));
    upd({ file: f, type: f.type, b64: null, text: null, ready: false });
    if (isExcel) {
      const r = new FileReader();
      r.onload = e => {
        try {
          let text = "";
          if (f.name.match(/\.csv$/i)) { text = e.target.result; }
          else {
            const wb = XLSX.read(e.target.result, { type:"binary" });
            wb.SheetNames.forEach(name => {
              text += "=== Sheet: " + name + " ===\n";
              text += XLSX.utils.sheet_to_csv(wb.Sheets[name], { blankrows:false }) + "\n\n";
            });
          }
          upd({ text, ready: true });
        } catch(err) { upd({ text:"Error: " + err.message, ready:false }); }
      };
      f.name.match(/\.csv$/i) ? r.readAsText(f) : r.readAsBinaryString(f);
    } else {
      const r = new FileReader();
      r.onload = e => upd({ b64: e.target.result.split(",")[1], ready: true });
      r.readAsDataURL(f);
    }
  };

  /* ── AI extraction ── */
  const processAI = async () => {
    const hasAny = Object.values(docs).some(d => d.ready);
    if (!hasAny) return;
    setLoading(true); setAiIsError(false);

    const makeContent = (doc, prompt) => {
      if (!doc.ready) return null;
      if (doc.type === "application/pdf" || doc.b64) {
        return [{ type:"document", source:{ type:"base64", media_type:"application/pdf", data:doc.b64 } }, { type:"text", text:prompt }];
      }
      const t = doc.text.length > 60000 ? doc.text.slice(0, 60000) + "\n...(truncated)" : doc.text;
      return [{ type:"text", text: prompt + "\n\nSpreadsheet content (CSV):\n\n" + t }];
    };

    const callAPI = async (content, label) => {
      setAiMsg("Analysing " + label + "…");
      const resp = await fetch("/.netlify/functions/claude", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:4000,
          system: "You are a Malaysian tax accountant. Output ONLY valid JSON, nothing else.",
          messages: [{ role:"user", content }] })
      });
      const json = await resp.json();
      if (!resp.ok || json.error) throw new Error(json.error?.message || "API error " + resp.status);
      const text = json.content.map(c => c.type === "text" ? c.text : "").join("");
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("No JSON in response for " + label);
      return JSON.parse(m[0]);
    };

    const n = v => { if (v === null || v === undefined) return 0; if (typeof v === "number") return v; return parseFloat(String(v).replace(/[^0-9.-]/g,"")) || 0; };

    try {
      let merged = {};

      if (docs.accounts.ready) {
        const p = await callAPI(makeContent(docs.accounts, EXTRACT_PROMPT), "management/audited accounts");
        console.log("Accounts:", p);
        const ca = k => ({ ia:n(p.capitalAllowances?.[k]?.ia), aa:n(p.capitalAllowances?.[k]?.aa), balancingCharge:n(p.capitalAllowances?.[k]?.balancingCharge), balancingAllowance:n(p.capitalAllowances?.[k]?.balancingAllowance) });
        merged = {
          grossRevenue: p.grossRevenue !== undefined ? n(p.grossRevenue) : "", netProfitBeforeTax:n(p.netProfitBeforeTax), depreciation:n(p.depreciation),
          entertainmentDisallowed: n(p.entertainmentDisallowed) || n(p.entertainmentExpensesTotal) * 0.5,
          penalties:n(p.penalties), nonApprovedDonations:n(p.nonApprovedDonations),
          incomeTaxProvision:n(p.incomeTaxProvision), privateExpenses:n(p.privateExpenses),
          capitalItemsToAddBack:n(p.capitalItemsToAddBack), otherAddBacks:n(p.otherAddBacks),
          dividendIncome:n(p.dividendIncome), interestIncome:n(p.interestIncome),
          rentalIncome:n(p.rentalIncome), royaltyIncome:n(p.royaltyIncome),
          approvedDonations:n(p.approvedDonations),
          capitalAllowances: {
            plantMachinery:    { label:"Plant & Machinery",           ...ca("plantMachinery")    },
            motorVehicles:     { label:"Motor Vehicles",              ...ca("motorVehicles")     },
            officeEquipment:   { label:"Office Equipment & Furniture",...ca("officeEquipment")   },
            computers:         { label:"Computers & IT Equipment",    ...ca("computers")         },
            industrialBuilding:{ label:"Industrial Buildings",        ...ca("industrialBuilding") },
          }
        };
        if (p.companyInfo) setInfo(prev => ({ ...prev,
          name: p.companyInfo.name || prev.name, ya: p.companyInfo.yearOfAssessment || prev.ya,
          bpStart: p.companyInfo.basisPeriodStart || prev.bpStart, bpEnd: p.companyInfo.basisPeriodEnd || prev.bpEnd
        }));
      }

      if (docs.assets.ready) {
        const p = await callAPI(makeContent(docs.assets, ASSET_PROMPT), "asset listing");
        console.log("Assets:", p);
        const mk = k => ({ ia:n(p[k]?.ia), aa:n(p[k]?.aa), balancingCharge:n(p[k]?.balancingCharge), balancingAllowance:n(p[k]?.balancingAllowance) });
        merged.capitalAllowances = {
          plantMachinery:    { label:"Plant & Machinery",           ...mk("plantMachinery")    },
          motorVehicles:     { label:"Motor Vehicles",              ...mk("motorVehicles")     },
          officeEquipment:   { label:"Office Equipment & Furniture",...mk("officeEquipment")   },
          computers:         { label:"Computers & IT Equipment",    ...mk("computers")         },
          industrialBuilding:{ label:"Industrial Buildings",        ...mk("industrialBuilding") },
        };
      }

      if (docs.cp204.ready) {
        const p = await callAPI(makeContent(docs.cp204, CP204_PROMPT), "CP204 payments");
        console.log("CP204:", p);
        merged.cp204Payments = (n(p.cp204Total) || 0) + (n(p.cp204A) || 0);
        if (n(p.taxDeductedAtSource)) merged.taxDeductedAtSource = n(p.taxDeductedAtSource);
        if (n(p.zakat)) merged.zakat = n(p.zakat);
      }

      if (docs.lastYear.ready) {
        const p = await callAPI(makeContent(docs.lastYear, LASTYEAR_PROMPT), "prior year tax computation");
        console.log("Last year:", p);
        if (n(p.unabsorbedLossesCF)) merged.unabsorbedLossesBF = n(p.unabsorbedLossesCF);
        if (n(p.unabsorbedCACF)) merged.unabsorbedCABF = n(p.unabsorbedCACF);
      }

      setData(prev => ({ ...prev, ...merged }));
      const fields = Object.entries(merged).filter(([k,v]) => typeof v === "number" && v !== 0).length;
      const docsUsed = Object.entries(docs).filter(([k,d]) => d.ready).map(([k]) => k).join(", ");
      if (fields === 0) {
        setAiIsError(true);

    document.head.appendChild(s);
  });

    setPdfLoading(true);
    try {
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
      await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
      const html = buildPrintHTML(info, res, info.isSME);
      const wrap = document.createElement("div");
      wrap.style.cssText = "position:fixed;left:-9999px;top:0;width:794px;background:#fff;font-family:Arial,sans-serif;font-size:9.5pt;";
      wrap.innerHTML = html.replace(/<script[\s\S]*?<\/script>/gi, "");
      document.body.appendChild(wrap);
      await new Promise(r => setTimeout(r, 400));
      const canvas = await window.html2canvas(wrap, { scale:2, useCORS:true, logging:false, width:794, windowWidth:794 });
      document.body.removeChild(wrap);
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:"mm", format:"a4", orientation:"portrait" });
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 12, contentW = pageW - margin * 2;
      const imgW = canvas.width, imgH = canvas.height;
      const ratio = contentW / (imgW * 0.264583);
      let y = 0, pageNum = 0;
      while (y < imgH) {
        if (pageNum > 0) doc.addPage();
        const sliceH = Math.min((pageH - margin * 2) / ratio / 0.264583, imgH - y);
        const sc = document.createElement("canvas");
        sc.width = imgW; sc.height = sliceH;
        sc.getContext("2d").drawImage(canvas, 0, y, imgW, sliceH, 0, 0, imgW, sliceH);
        doc.addImage(sc.toDataURL("image/jpeg", 0.95), "JPEG", margin, margin, contentW, sliceH * 0.264583 * ratio);
        y += sliceH; pageNum++;
      }
      doc.save((info.name || "TaxComputation").replace(/[^a-zA-Z0-9]/g,"_") + "_YA" + info.ya + ".pdf");

        </>}
        {res.div > 0 && res.taxableOther === 0 && (
          <div style={{ fontSize:11, color:"var(--clr-ok)", padding:"4px 0" }}>
            ✓ Dividend income of RM {fmAbs(res.div)} is exempt (Schedule 6, single-tier) — not included in aggregate income.
          </div>
        )}
        <div style={S.rowGrand}><div>Aggregate income</div><div />{numCell(fm(res.aggregateIncome, false), res.aggregateIncome < 0)}</div>

        {/* D. Chargeable Income */}
        <div style={S.secHd}>D. Chargeable income</div>
        <div style={S.rowBase}>
          <div style={{ fontSize:13, display:"flex", alignItems:"center", flexWrap:"wrap", gap:4 }}>
            LESS: Approved donations [s.44(6)]{infoBtn("approvedDonations")}
            <span style={{ fontSize:11, color:"var(--text2)" }}>(max 10% of aggregate = RM{fm(res.maxDon)})</span>
          </div>
          <div />{NumInput("approvedDonations", data.approvedDonations)}
        </div>
        <div style={S.rowTotal}><div style={{ fontSize:13, fontWeight:500 }}>Total income</div><div /><div style={S.numCell}>{fm(res.totalIncome)}</div></div>
        <div style={S.rowBase}>
          <div style={{ fontSize:13, display:"flex", alignItems:"center", flexWrap:"wrap", gap:4 }}>
            LESS: Unabsorbed business losses b/f [s.44(2)]{infoBtn("losses")}
            <span style={{ fontSize:11, color:"var(--text2)" }}>(max 70% of stat. income = RM{fm(res.maxLoss)})</span>
          </div>
          <div />{NumInput("unabsorbedLossesBF", data.unabsorbedLossesBF)}
        </div>
        <div style={S.rowBase}>
          <div style={{ fontSize:13 }}>LESS: Unabsorbed capital allowances b/f</div>
          <div />{NumInput("unabsorbedCABF", data.unabsorbedCABF)}
        </div>
        <div style={S.rowGrand}><div>Chargeable income</div><div />{numCell(fm(res.chargeableIncome, false), false)}</div>

        {/* E. Tax */}
        <div style={S.secHd}>E. Tax computation{infoBtn("smeRates")}</div>
        <div style={{ background:"var(--bg2)", borderRadius:8, padding:"10px 12px", marginBottom:8, fontSize:12, color:"var(--text2)" }}>
          {info.isSME ? `SME rates apply (paid-up capital ≤ RM2.5M · Finance Act 2023 · YA ${info.ya})` : `Standard rate 24% flat (non-SME · YA ${info.ya})`}
        </div>
        {res.taxBD.map((b, i) => (
          <div key={i} style={S.rowBase}><div style={{ fontSize:13, paddingLeft:16 }}>{b.label}</div><div />{numCell(fm(b.amount), false)}</div>
        ))}
        <div style={S.rowTotal}><div style={{ fontSize:13, fontWeight:500 }}>Gross tax payable</div><div /><div style={S.numCell}>{fm(res.grossTax)}</div></div>

        <div style={{ marginTop:8, marginBottom:4, fontSize:12, fontWeight:500, color:"var(--text2)" }}>LESS: Tax credits & payments</div>
        {[
          ["Monthly tax instalments paid (CP204)",              "cp204Payments"],
          ["Tax deducted at source (CP502 / withholding tax)", "taxDeductedAtSource"],
          ["Zakat (direct rebate [s.110])",                     "zakat"],
        ].map(([label, field]) => (
          <div key={field} style={S.rowBase}><div style={{ fontSize:13 }}>{label}</div><div />{NumInput(field, data[field])}</div>
        ))}
        <div style={S.rowTotal}><div style={{ fontSize:13 }}>Total credits</div><div /><div style={S.numCell}>{fm(res.totalCredits)}</div></div>
        <div style={{ ...S.rowGrand, background: res.netTax >= 0 ? "rgba(220,53,69,0.06)" : "rgba(25,135,84,0.06)" }}>
          <div>{res.netTax >= 0 ? "Balance tax payable" : "Tax (refundable)"}</div>
          <div />
          <div style={{ ...S.numCell, fontSize:15, fontWeight:600, color: res.netTax >= 0 ? "var(--clr-danger)" : "var(--clr-ok)" }}>{fmAbs(res.netTax)}</div>
        </div>

        <div style={{ marginTop:20, padding:"14px 16px", background:"var(--bg2)", borderRadius:8, fontSize:12, color:"var(--text2)", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
          <span><i className="ti ti-info-circle" aria-hidden="true" style={{ marginRight:6 }} />Click any ⓘ icon for legal references and LHDN guidelines.</span>
          {pdfBtn}
        </div>
      </div>
    </div>
  );

  /* ══════════════ NOTES PANEL ══════════════ */
  const renderNotePanel = () => {
    if (!note) return null;
    return (
      <div style={{ width:300, flexShrink:0 }}>
        <div style={{ position:"sticky", top:16 }}>
          <div style={{ background:"var(--bg1)", border:"0.5px solid var(--border3)", borderRadius:12, overflow:"hidden" }}>
            <div style={{ background:"#0D2137", padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:13, fontWeight:500, color:"#fff" }}>{note.title}</div>
              <button onClick={() => setNote(null)} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:4, color:"#fff", cursor:"pointer", padding:"2px 8px", fontSize:13 }}>✕</button>
            </div>
            <div style={{ padding:"14px" }}>
              <div style={{ fontSize:11, color:"var(--clr-info)", background:"var(--bg-info)", borderRadius:4, padding:"4px 8px", marginBottom:10, display:"inline-block" }}>{note.ref}</div>
              <p style={{ fontSize:12, lineHeight:1.6, color:"var(--text1)", marginBottom:12 }}>{note.body}</p>
              {note.rates && note.rates[0]?.length === 3 && (
                <table style={{ width:"100%", borderCollapse:"collapse", marginBottom:12, fontSize:11 }}>
                  <thead><tr style={{ background:"var(--bg2)" }}>
                    <td style={{ padding:"4px 6px", fontWeight:500 }}>Asset Category</td>
                    <td style={{ padding:"4px 6px", fontWeight:500, textAlign:"center" }}>IA</td>
                    <td style={{ padding:"4px 6px", fontWeight:500, textAlign:"center" }}>AA</td>
                  </tr></thead>
                  <tbody>{note.rates.map((r, i) => (
                    <tr key={i} style={{ borderTop:"0.5px solid var(--border3)" }}>
                      <td style={{ padding:"3px 6px" }}>{r[0]}</td>
                      <td style={{ padding:"3px 6px", textAlign:"center", fontFamily:"var(--mono)" }}>{r[1]}</td>
                      <td style={{ padding:"3px 6px", textAlign:"center", fontFamily:"var(--mono)" }}>{r[2]}</td>
                    </tr>
                  ))}</tbody>
                </table>
              )}
              {note.rates && note.rates[0]?.length === 2 && (
                <table style={{ width:"100%", borderCollapse:"collapse", marginBottom:12 }}>
                  <thead><tr style={{ background:"var(--bg2)" }}>
                    <td style={{ padding:"4px 6px", fontWeight:500, fontSize:11 }}>Chargeable income</td>
                    <td style={{ padding:"4px 6px", fontWeight:500, textAlign:"center", fontSize:11 }}>Rate</td>
                  </tr></thead>
                  <tbody>{note.rates.map((r, i) => (
                    <tr key={i} style={{ borderTop:"0.5px solid var(--border3)" }}>
                      <td style={{ padding:"3px 6px", fontSize:11 }}>{r[0]}</td>
                      <td style={{ padding:"3px 6px", textAlign:"center", fontFamily:"var(--mono)", fontWeight:500 }}>{r[1]}</td>
                    </tr>
                  ))}</tbody>
                </table>
              )}
              {note.tips && <>
                <div style={{ fontSize:11, fontWeight:500, color:"var(--text2)", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.5px" }}>Key points</div>
                <ul style={{ margin:0, padding:"0 0 0 14px" }}>
                  {note.tips.map((t, i) => <li key={i} style={{ fontSize:11, lineHeight:1.6, color:"var(--text1)", marginBottom:3 }}>{t}</li>)}
                </ul>
              </>}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ══════════════ RENDER ══════════════ */
  return (
    <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", minHeight:"100vh", background:"var(--bg3)", color:"var(--text1)" }}>
      <header style={{ background:"#0D2137", color:"#fff", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:32, height:32, background:"#C8A44E", borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:13, color:"#0D2137" }}>TC</div>
          <div>
            <div style={{ fontWeight:600, fontSize:15, letterSpacing:"0.3px" }}>MyTax Compute</div>
            <div style={{ fontSize:11, opacity:0.65 }}>Malaysian Corporate Tax · Income Tax Act 1967 · LHDN Compliant</div>
          </div>
        </div>
        <div style={{ fontSize:12, opacity:0.5, display:"flex", alignItems:"center", gap:6 }}>
          <i className="ti ti-calendar" aria-hidden="true" /> YA {info.ya}
        </div>
      </header>

      <nav style={{ background:"#132A47", padding:"8px 20px", display:"flex", gap:8, flexWrap:"wrap" }}>
        <NavBtn step={step} setStep={setStep} i={1} label="Company info" />
        <NavBtn step={step} setStep={setStep} i={2} label="Upload / data entry" />
        <NavBtn step={step} setStep={setStep} i={3} label="Tax computation" />
      </nav>

      <div style={{ maxWidth:1060, margin:"0 auto", padding:"20px 16px", display:"flex", gap:16 }}>
        <div style={{ flex:1, minWidth:0 }}>
          {step === 1 && renderStep1()}
          {step === 2 && renderStep2()}
          {step === 3 && renderStep3()}
        </div>
        {renderNotePanel()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
